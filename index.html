<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In - IDAI Universe</title>
  <!-- Bootstrap Latest CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="col-md-6">
      <div class="card shadow-lg">
        <div class="card-header text-center">
          <h2>Sign In</h2>
          <p class="text-muted">Fill in your basic information</p>
        </div>
        <div class="card-body">
          <form id="signInForm">
            <!-- Full Name -->
            <div class="mb-3">
              <label for="fullName" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="fullName" placeholder="Enter your full name">
            </div>

            <!-- Username -->
            <div class="mb-3">
              <label for="username" class="form-label">User Name</label>
              <input type="text" class="form-control" id="username" placeholder="Choose a username">
            </div>

            <!-- Passcode -->
            <div class="mb-3">
              <label for="passcode" class="form-label">Passcode</label>
              <input type="password" class="form-control" id="passcode" placeholder="Enter your password">
            </div>

            <!-- Gmail -->
            <div class="mb-3">
              <label for="gmail" class="form-label">G-mail</label>
              <input type="email" class="form-control" id="gmail" placeholder="Enter your Gmail address">
            </div>

            <!-- Contact Number -->
            <div class="mb-3">
              <label for="contactNumber" class="form-label">Contact Number</label>
              <input type="tel" class="form-control" id="contactNumber" placeholder="Enter your phone number">
            </div>

            <!-- Age -->
            <div class="mb-3">
              <label for="age" class="form-label">Age</label>
              <input type="number" class="form-control" id="age" placeholder="Enter your age">
            </div>

            <!-- Profession -->
            <div class="mb-3">
              <label for="profession" class="form-label">Profession</label>
              <input type="text" class="form-control" id="profession" placeholder="Enter your profession">
            </div>

            <!-- Error Messages Placeholder -->
            <div class="mb-3 text-danger" id="errorMessages"></div>

            <!-- Submit Button -->
            <div class="d-grid">
              <button type="submit" class="btn btn-primary" id="submitBtn">Sign In</button>
            </div>

          </form>
        </div>
        <div class="card-footer text-center text-muted">
          <small>© 2026 IDAI Universe</small>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
